services:
  postgres:
    image: postgres:16-alpine
    container_name: barbro-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: barbro
      POSTGRES_PASSWORD: barbro
      POSTGRES_DB: barbro
    volumes:
      - barbro_pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro

volumes:
  barbro_pgdata:
