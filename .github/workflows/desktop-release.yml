name: Desktop release

# Fires only when a `desktop-v*` tag is pushed (e.g. desktop-v0.1.1). The web
# app deploys independently via Netlify on every push to main and is NOT
# touched by this workflow — different cadence, different artifact.
on:
  push:
    tags:
      - 'desktop-v*'

jobs:
  build-mac:
    name: Build macOS DMG (arm64 + x64)
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Sync the package.json version to the pushed git tag (e.g.
      # `desktop-v0.1.3` → `0.1.3`). Three things depend on this being
      # right at build time:
      #   1. The sidecar's `/ping` endpoint reads version from
      #      package.json — the web app's min-version gate compares
      #      against that.
      #   2. The DMG title (`dmg.title: "${productName} ${version}"`)
      #      shows the version when the user mounts the disk image.
      #   3. electron-builder's `latest-mac.yml` records the version
      #      for any future auto-updater wiring.
      - name: Sync package.json version to tag
        working-directory: desktop
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          npm pkg set version="$VERSION"
          echo "Synced desktop/package.json version → $VERSION"

      - name: Install desktop deps
        working-directory: desktop
        run: npm install

      - name: Build DMG
        working-directory: desktop
        env:
          # Skip code signing — no Developer ID yet. Users right-click → Open
          # to bypass Gatekeeper on first launch.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        # `--publish never` is load-bearing: when electron-builder
        # detects a git tag on the workspace it triggers an *implicit*
        # publish step (even without --publish always), which then
        # crashes the workflow because GH_TOKEN isn't set. We don't
        # want it to publish at all — we hand the artifacts to
        # softprops/action-gh-release below so they land on the actual
        # `desktop-vX.Y.Z` tag instead of electron-builder's hardcoded
        # `v${version}` tag.
        run: npx electron-builder --mac --arm64 --x64 --publish never

      - name: Upload to the pushed tag's GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # `github.ref_name` is the literal git tag (e.g.
          # `desktop-v0.1.3`). Uploading to that tag means the release
          # with the assets is the same release the static manifest's
          # `releases/latest/download/...` URLs resolve to (since the
          # most-recent release becomes "latest" automatically).
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            desktop/release/*.dmg
            desktop/release/*.dmg.blockmap
            desktop/release/*.zip
            desktop/release/*.zip.blockmap
            desktop/release/latest-mac.yml
